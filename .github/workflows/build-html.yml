name: Build & Deploy HTML Site

on:
  # Manual trigger only during internal-distribution phase.
  # Uncomment the push trigger when ready to go public.
  #
  # push:
  #   branches: [main]
  #   paths:
  #     - "book/**"
  #     - "config/**"
  #     - "scripts/build-html.sh"
  #     - ".github/workflows/build-html.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends pandoc

      - name: Build HTML site
        run: bash scripts/build-html.sh _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
