name: Build All Assets

on:
  push:
    branches: [main]
    paths:
      - "book/**"
      - "config/**"
      - "artefacts/**"
      - "scripts/**"
      - ".github/workflows/build-pdf.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pandoc and TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            latexmk \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-latex-recommended \
            texlive-latex-extra \
            lmodern \
            fonts-dejavu \
            fonts-dejavu-extra \
            fonts-texgyre
          sudo fc-cache -f

      - name: Build all assets
        run: bash scripts/build-all.sh

      - name: Upload all releases
        uses: actions/upload-artifact@v4
        with:
          name: sovereign-cloud-operations-releases
          path: releases/
          retention-days: 90
          if-no-files-found: error
